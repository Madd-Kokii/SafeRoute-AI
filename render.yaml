# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo, then set DATABASE_URL to your Neon PostgreSQL connection string.
services:
  - type: web
    name: saferoute-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/setup_db.py
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 wsgi:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: production
      - key: SEED_SKIP_ROUTES
        value: "true"
      - key: SERPER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SEED_ADMIN_EMAIL
        value: admin@saferoute.ai
      - key: SEED_ADMIN_PASSWORD
        sync: false
